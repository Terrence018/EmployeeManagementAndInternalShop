spring:
  application:
    name: empMall-api

  datasource:
    # 使用變數 ${DB_URL}，如果沒有設定變數，預設值會用冒號後面的 localhost
    # 為了 Docker使用，此處主要依賴外部傳入的 DB_URL
    url: ${DB_URL:jdbc:mysql://localhost:3306/emp_mall?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

mybatis:
#  非必要，因已修正為同包同名
#  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

logging:
  level:
    org.springframework.jdbc.support.JdbcTransactionManager: debug

aws:
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  s3:
    region: ap-northeast-1
    bucket: emp-mall-image-2025
